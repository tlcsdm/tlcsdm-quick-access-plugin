# Artifact Workflow
# Runs on every push to master branch and uploads extension artifacts

name: Build Artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build extension
        run: npm run build

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/tlcsdm-quick-access-chrome.zip
          retention-days: 7

      - name: Upload Edge extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-extension
          path: dist/tlcsdm-quick-access-edge.zip
          retention-days: 7
