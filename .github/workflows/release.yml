# Release Workflow
# Triggered on release creation to upload extension artifacts

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build extension
        run: npm run build

      - name: Upload extensions to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tlcsdm-quick-access-chrome.zip
            dist/tlcsdm-quick-access-edge.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
