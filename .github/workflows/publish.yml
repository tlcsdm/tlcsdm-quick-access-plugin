# Publish to Extension Stores Workflow
# Manually triggered workflow to publish extensions to Chrome Web Store and Edge Add-ons

name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target store to publish'
        required: true
        default: 'both'
        type: choice
        options:
          - chrome
          - edge
          - both
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build extension
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/tlcsdm-quick-access-chrome.zip

      - name: Upload Edge extension
        uses: actions/upload-artifact@v4
        with:
          name: edge-extension
          path: dist/tlcsdm-quick-access-edge.zip

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'chrome' || github.event.inputs.target == 'both' }}

    steps:
      - name: Download Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension

      - name: Publish to Chrome Web Store
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: tlcsdm-quick-access-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run - Skipping Chrome Web Store publish"

  publish-edge:
    name: Publish to Edge Add-ons
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'edge' || github.event.inputs.target == 'both' }}

    steps:
      - name: Download Edge extension
        uses: actions/download-artifact@v4
        with:
          name: edge-extension

      - name: Publish to Edge Add-ons
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: nicemichaelz/edge-addon-upload@v1
        with:
          product_id: ${{ secrets.EDGE_PRODUCT_ID }}
          client_id: ${{ secrets.EDGE_CLIENT_ID }}
          client_secret: ${{ secrets.EDGE_CLIENT_SECRET }}
          access_token_url: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
          zip_path: tlcsdm-quick-access-edge.zip

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run - Skipping Edge Add-ons publish"
